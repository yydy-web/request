shellEmulator: true

trustPolicy: no-downgrade

# Keep no-downgrade enforcement, but allow these verified transitive deps whose
# specific pinned versions lack the provenance their earlier releases had.
trustPolicyExclude:
  - "chokidar@4.0.3"
  - "semver@6.3.1"

# Disable the "package must be N minutes old" gate. pnpm 11.9 defaults this to
# 1440 (24h), which rejects freshly published transitive deps already pinned in
# the lockfile (ERR_PNPM_LOCKFILE_RESOLUTION_VERIFICATION).
minimumReleaseAge: 0

# Allow these dependencies to run their (required) install/build scripts so the
# pre-run deps check stops failing with ERR_PNPM_IGNORED_BUILDS.
onlyBuiltDependencies:
  - "@parcel/watcher"
  - core-js
  - esbuild
  - msw

packages:
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  core-js: set this to true or false
  esbuild: false
  msw: true
